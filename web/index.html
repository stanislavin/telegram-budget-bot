  function providerBadgeClass(provider) {
    if (provider === 'local') return 'local';
    if (provider === 'openrouter') return 'openrouter';
    return 'custom';
  }

  function isOverridden(setting, envOverrides) {
    const p = setting.provider;
    const n = setting.name;
    const overridden = {};
    if (p === 'local' && n === 'primary') {
      if (envOverrides['local.primary.url']) overridden.url = envOverrides['local.primary.url'];
      if (envOverrides['local.primary.model']) overridden.model = envOverrides['local.primary.model'];
      if (envOverrides['local.primary.timeout']) overridden.timeout = envOverrides['local.primary.timeout'];
    }
    if (p === 'openrouter') {
      if (envOverrides['openrouter.*.api_key']) overridden.api_key = true;
      if (envOverrides['openrouter.*.url']) overridden.url = envOverrides['openrouter.*.url'];
      if (n === 'primary' && envOverrides['openrouter.primary.model']) overridden.model = envOverrides['openrouter.primary.model'];
    }
    return overridden;
  }

  function renderField(label, field, value, id, override, type) {
    type = type || 'text';
    let extra = '';
    let cls = '';
    if (override) {
      cls = ' overridden';
      extra = `<span class="env-override">env override</span>`;
    }
    return `<div class="admin-field"><label>${label}</label><input type="${type}" id="llm_${id}_${field}" value="${escHtml(value)}" class="${cls}"> ${extra}</div>`;
  }

  function renderNumField(label, field, value, id, override) {
    let extra = '';
    let cls = '';
    if (override) {
      cls = ' overridden';
      extra = `<span class="env-override">env override</span>`;
    }
    return `<div class="admin-field"><label>${label}</label><input type="number" id="llm_${id}_${field}" value="${value}" min="0" class="${cls}"> ${extra}</div>`;
  }

  function renderAddField(label, id, placeholder, type) {
    type = type || 'text';
    return `<div class="admin-field"><label>${label}</label><input type="${type}" id="${id}" placeholder="${placeholder}"></div>`;
  }

  function escHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

    const body = {
      provider: s.provider,
      name: s.name,
      model: document.getElementById(`llm_${id}_model`).value,
      url: document.getElementById(`llm_${id}_url`).value,
      api_key: document.getElementById(`llm_${id}_api_key`).value || null,
      timeout: parseInt(document.getElementById(`llm_${id}_timeout`).value) || 30,
      priority: parseInt(document.getElementById(`llm_${id}_priority`).value) || 0,
      enabled: s.enabled,
    };
    fetch('/api/llm-settings', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(body) })
      .then(r => r.json())
      .then(data => {
        if (data.error) throw new Error(data.error);
        flashStatus(id);
        fetchLLMSettings();
      })
      .catch(err => alert('Error saving: ' + err.message));
  });

  // Toggle enabled
  document.addEventListener('llm-toggle', e => {
    const { id, enabled } = e.detail;
    const s = llmSettingsData.settings.find(s => s.id === id);
    if (!s) return;
    const body = { ...s, enabled, api_key: s.api_key || null };
    fetch('/api/llm-settings', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(body) })
      .then(r => r.json())
      .then(data => {
        if (data.error) throw new Error(data.error);
        fetchLLMSettings();
      })
      .catch(err => alert('Error toggling: ' + err.message));
  });

  // Delete
  document.addEventListener('llm-delete', e => {
    if (!confirm('Delete this provider setting?')) return;
    fetch(`/api/llm-settings/${e.detail.id}`, { method: 'DELETE' })
      .then(r => r.json())
      .then(data => {
        if (data.error) throw new Error(data.error);
        fetchLLMSettings();
      })
      .catch(err => alert('Error deleting: ' + err.message));
  });

  // Add form toggle
  document.addEventListener('llm-add-toggle', () => {
    const form = document.getElementById('adminAddForm');
    if (form) form.classList.toggle('open');
  });

  // Add new
  document.addEventListener('llm-add-save', () => {
    const body = {
      provider: document.getElementById('new_provider').value.trim(),
      name: document.getElementById('new_name').value.trim(),
      model: document.getElementById('new_model').value.trim(),
      url: document.getElementById('new_url').value.trim(),
      api_key: document.getElementById('new_api_key').value.trim() || null,
      timeout: parseInt(document.getElementById('new_timeout').value) || 30,
      priority: parseInt(document.getElementById('new_priority').value) || 0,
      enabled: true,
    };
    if (!body.provider || !body.name || !body.model || !body.url) {
      alert('Provider, name, model, and URL are required');
      return;
    }
    fetch('/api/llm-settings', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(body) })
      .then(r => r.json())
      .then(data => {
        if (data.error) throw new Error(data.error);
        fetchLLMSettings();
      })
      .catch(err => alert('Error adding: ' + err.message));
  });

  // Demo mode toggle
  document.addEventListener('change', e => {
    if (e.target.id !== 'demoModeToggle') return;
    const demo = e.target.checked;
    fetch('/api/demo-mode', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({demo}),
    })
      .then(r => r.json())
      .then(d => {
        if (d.error) { alert('Error: ' + d.error); return; }
        applyDemoMode(d.demo);
        if (budgetData) fetchBudget();
      })
      .catch(err => alert('Error toggling demo mode: ' + err.message));
  });

})();
</script>
</body>
</html>
